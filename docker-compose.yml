version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: network_anomaly_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: network_anomaly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: network_anomaly_api
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/network_anomaly
      - ALERT_EMAIL_SENDER=${ALERT_EMAIL_SENDER}
      - ALERT_EMAIL_RECEIVER=${ALERT_EMAIL_RECEIVER}
      - ALERT_EMAIL_PASSWORD=${ALERT_EMAIL_PASSWORD}
      - ANOMALY_THRESHOLD=0.5
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: network_anomaly_dashboard
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
      - DATABASE_URL=postgresql://postgres:password@db:5432/network_anomaly
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
